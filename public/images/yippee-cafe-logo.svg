<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Yippee Cafe logo</title>
  <desc id="desc">A playful Yippee Cafe logo with bold cafe text, a cowboy hat, a lasso loop, and a coffee cup.</desc>
  <defs>
    <linearGradient id="sunset" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffcf33"/>
      <stop offset="0.52" stop-color="#ff8a00"/>
      <stop offset="1" stop-color="#ff5f8f"/>
    </linearGradient>
    <linearGradient id="foam" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff8e8"/>
      <stop offset="1" stop-color="#ffe9ad"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#3b2108" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1200" height="800" rx="72" fill="#fff6df"/>
  <circle cx="180" cy="154" r="138" fill="#ff6f91" opacity="0.18"/>
  <circle cx="1018" cy="176" r="170" fill="#219ebc" opacity="0.16"/>
  <circle cx="956" cy="632" r="138" fill="#5fad56" opacity="0.16"/>

  <!-- Lasso loop -->
  <path d="M238 436c-68-30-98-82-70-123 42-62 172-58 292-10 190 76 286 69 333 10 28-35 12-88-46-106-89-27-181 33-178 102 5 117 205 168 340 118 95-35 139-101 118-155" fill="none" stroke="#c67a16" stroke-width="21" stroke-linecap="round" stroke-linejoin="round" opacity="0.88"/>
  <path d="M229 440c-43 30-83 65-120 108" fill="none" stroke="#c67a16" stroke-width="17" stroke-linecap="round"/>
  <path d="M968 175c25 28 45 60 59 97" fill="none" stroke="#c67a16" stroke-width="15" stroke-linecap="round"/>

  <!-- Badge background -->
  <g filter="url(#softShadow)">
    <path d="M179 544c72-128 206-211 374-226 186-16 361 38 487 146 28 24 31 66 6 93-96 103-269 157-461 151-183-6-340-68-405-156-2-3-3-5-1-8z" fill="url(#foam)" stroke="#251605" stroke-width="10"/>
  </g>

  <!-- Coffee cup mark -->
  <g transform="translate(774 482) rotate(-5)">
    <path d="M42 44h160l-18 123c-5 35-36 61-72 61H88c-36 0-67-26-72-61L-2 44h44z" fill="#ffffff" stroke="#251605" stroke-width="10" stroke-linejoin="round"/>
    <path d="M199 74h30c32 0 56 26 52 57-4 29-29 51-59 51h-39" fill="none" stroke="#251605" stroke-width="10" stroke-linecap="round"/>
    <path d="M44 82h154" stroke="#ffb703" stroke-width="18" stroke-linecap="round"/>
    <path d="M66 20c-15-19-5-37 10-52M120 22c-16-22-3-39 10-57M174 20c-16-20-4-39 10-56" fill="none" stroke="#fb8500" stroke-width="10" stroke-linecap="round" opacity="0.82"/>
  </g>

  <!-- Cowboy hat -->
  <g transform="translate(384 196) rotate(-8)">
    <path d="M64 128c33-65 82-97 147-97 40 0 64 25 85 25 20 0 43-18 71-6 35 15 54 51 61 104-90 18-184 16-364-26z" fill="#8b4a17" stroke="#251605" stroke-width="10" stroke-linejoin="round"/>
    <path d="M92 127c66 28 173 43 311 23" fill="none" stroke="#ffcf33" stroke-width="18" stroke-linecap="round"/>
    <path d="M8 142c110 47 270 60 492 15 27-5 48 21 31 43-30 40-103 63-219 70-136 8-244-13-321-64-24-16-12-74 17-64z" fill="#a85f21" stroke="#251605" stroke-width="10" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <text x="178" y="504" fill="#251605" font-family="Cooper Black, Baloo 2, Avenir Next Rounded, Arial Rounded MT Bold, system-ui, sans-serif" font-size="154" font-weight="900" letter-spacing="-9">Yippee</text>
  <text x="282" y="640" fill="url(#sunset)" stroke="#251605" stroke-width="5" paint-order="stroke fill" font-family="Cooper Black, Baloo 2, Avenir Next Rounded, Arial Rounded MT Bold, system-ui, sans-serif" font-size="126" font-weight="900" letter-spacing="-5">Cafe</text>

  <path d="M229 683c113 43 316 67 537 20" fill="none" stroke="#219ebc" stroke-width="16" stroke-linecap="round" opacity="0.82"/>
  <text x="600" y="746" text-anchor="middle" fill="#6c4a1f" font-family="Inter, Avenir Next, system-ui, sans-serif" font-size="33" font-weight="900" letter-spacing="5">PLAYFUL APPS • GAMES • TOOLS</text>
</svg>
