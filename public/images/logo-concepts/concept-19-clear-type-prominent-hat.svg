<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Yippee Cafe logo concept 19 - clear typography with prominent hat</title>
  <desc id="desc">A Yippee Cafe logo concept with unobstructed typography, a prominent cowboy hat above the wordmark, and a physically plausible lasso underline.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#fff0c8"/>
    </linearGradient>
    <linearGradient id="rope" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd86b"/>
      <stop offset="0.5" stop-color="#d88820"/>
      <stop offset="1" stop-color="#a55a13"/>
    </linearGradient>
    <linearGradient id="whiteFelt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffef6"/>
      <stop offset="0.5" stop-color="#efe8d7"/>
      <stop offset="1" stop-color="#cfc4ad"/>
    </linearGradient>
    <linearGradient id="whiteBrim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdf4"/>
      <stop offset="0.56" stop-color="#eadfc9"/>
      <stop offset="1" stop-color="#b9aa8e"/>
    </linearGradient>
    <radialGradient id="silver" cx="36%" cy="30%" r="72%">
      <stop offset="0" stop-color="#fffdf2"/>
      <stop offset="0.43" stop-color="#cfccc3"/>
      <stop offset="1" stop-color="#5a5a54"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#3b2108" flood-opacity="0.16"/>
    </filter>
    <filter id="typeLift" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="7" stdDeviation="0" flood-color="#f2ba58" flood-opacity="0.7"/>
    </filter>
  </defs>

  <rect width="1400" height="900" rx="72" fill="url(#paper)"/>
  <circle cx="182" cy="146" r="144" fill="#ff6f91" opacity="0.13"/>
  <circle cx="1190" cy="218" r="186" fill="#219ebc" opacity="0.12"/>
  <circle cx="1070" cy="748" r="128" fill="#5fad56" opacity="0.11"/>

  <!-- Prominent hat lives above the wordmark. It is large enough to own the brand silhouette, but it does not cover any letters. -->
  <g transform="translate(344 70) rotate(-6) scale(.67)" filter="url(#softShadow)">
    <!-- brim first -->
    <path d="M42 235 C151 284 300 304 486 294 C661 285 822 255 970 209 C1040 187 1095 200 1114 235 C1134 271 1086 305 991 323 C746 369 532 392 346 378 C184 366 59 332 -28 278 C-76 248 -14 211 42 235Z" fill="url(#whiteBrim)" stroke="#251605" stroke-width="13" stroke-linejoin="round"/>
    <path d="M96 246 C224 274 376 283 548 273 C715 264 864 241 995 205" fill="none" stroke="#fffdf4" stroke-width="11" stroke-linecap="round" opacity="0.76"/>
    <!-- crown overlaps brim; band covers seam, so there is no crown/brim gap -->
    <path d="M312 274 C300 193 302 120 316 52 C328 -7 369 -42 433 -50 C534 -63 642 -40 693 0 C731 30 744 71 738 125 C731 192 735 243 753 278 C644 310 416 308 312 274Z" fill="url(#whiteFelt)" stroke="#251605" stroke-width="13" stroke-linejoin="round"/>
    <path d="M414 54 C496 82 591 85 700 61" fill="none" stroke="#fffdf4" stroke-width="16" stroke-linecap="round" opacity="0.82"/>
    <path d="M453 -39 C412 10 393 69 397 138" fill="none" stroke="#b9ad97" stroke-width="12" stroke-linecap="round" opacity="0.48"/>
    <path d="M612 -30 C650 21 665 79 656 145" fill="none" stroke="#b9ad97" stroke-width="12" stroke-linecap="round" opacity="0.48"/>
    <path d="M323 254 C416 283 635 286 742 258" fill="none" stroke="#15120f" stroke-width="34" stroke-linecap="round"/>
    <path d="M342 249 C442 269 630 270 732 252" fill="none" stroke="#3c302b" stroke-width="8" stroke-linecap="round" opacity="0.82"/>
    <g stroke="#1e1e1c" stroke-width="3">
      <circle cx="365" cy="251" r="16" fill="url(#silver)"/>
      <circle cx="430" cy="260" r="8" fill="url(#silver)"/>
      <circle cx="490" cy="263" r="8" fill="url(#silver)"/>
      <circle cx="550" cy="263" r="8" fill="url(#silver)"/>
      <circle cx="610" cy="258" r="8" fill="url(#silver)"/>
      <circle cx="692" cy="246" r="16" fill="url(#silver)"/>
    </g>
  </g>

  <!-- Main typography: no graphics on top of it. Solid fill, controlled spacing, less cheap/clipart than the previous Cooper-heavy pass. -->
  <g filter="url(#typeLift)">
    <text x="103" y="500" fill="#251605" font-family="Rockwell, Georgia, New York, serif" font-size="188" font-weight="900" letter-spacing="-5">Yippee</text>
  </g>
  <text x="433" y="641" fill="#fff8ea" stroke="#251605" stroke-width="7" paint-order="stroke fill" font-family="Avenir Next, Avenir, Arial Rounded MT Bold, system-ui, sans-serif" font-size="120" font-weight="900" letter-spacing="20">CAFE</text>

  <!-- Correct lasso underline: below typography, single loop to the right, one honda knot, one standing rope. It reads as a swoosh without obscuring the wordmark. -->
  <g filter="url(#softShadow)">
    <path d="M154 682 C304 742 552 748 796 704 C844 696 868 671 886 603" fill="none" stroke="#7b3f11" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M154 682 C304 742 552 748 796 704 C844 696 868 671 886 603" fill="none" stroke="url(#rope)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M170 688 C318 734 552 738 789 697 C832 690 855 665 876 604" fill="none" stroke="#ffe18d" stroke-width="4" stroke-linecap="round" stroke-dasharray="2 22" opacity="0.86"/>

    <path d="M886 603 C892 515 974 462 1061 478 C1134 492 1148 551 1098 608 C1034 683 901 686 886 603 Z" fill="none" stroke="#7b3f11" stroke-width="28" stroke-linejoin="round"/>
    <path d="M886 603 C892 515 974 462 1061 478 C1134 492 1148 551 1098 608 C1034 683 901 686 886 603 Z" fill="none" stroke="url(#rope)" stroke-width="20" stroke-linejoin="round"/>
    <path d="M901 601 C908 533 975 488 1050 502 C1107 513 1119 558 1080 601 C1027 660 920 663 901 601 Z" fill="none" stroke="#ffe18d" stroke-width="4" stroke-dasharray="2 22" opacity="0.76"/>

    <g transform="translate(886 603) rotate(-13)">
      <ellipse cx="0" cy="0" rx="24" ry="18" fill="#bd6b18" stroke="#7b3f11" stroke-width="8"/>
      <ellipse cx="0" cy="0" rx="9" ry="6" fill="#fff1a6" opacity="0.44"/>
    </g>
  </g>

  <text x="700" y="812" text-anchor="middle" fill="#6c4a1f" font-family="Avenir Next, Inter, system-ui, sans-serif" font-size="31" font-weight="900" letter-spacing="6">PLAYFUL APPS • GAMES • TOOLS</text>
</svg>
