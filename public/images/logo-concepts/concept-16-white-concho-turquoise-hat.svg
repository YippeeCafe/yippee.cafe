<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Yippee Cafe logo concept 16 - white concho turquoise cowboy hat</title>
  <desc id="desc">A Yippee Cafe wordmark using a white cowboy hat reference: tall rounded crown, wide curled brim, black band, silver conchos, and small turquoise accents.</desc>
  <defs>
    <linearGradient id="sunset" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffcf33"/>
      <stop offset="0.58" stop-color="#fb8500"/>
      <stop offset="1" stop-color="#ff6f91"/>
    </linearGradient>
    <linearGradient id="whiteFelt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffef4"/>
      <stop offset="0.48" stop-color="#eee9dc"/>
      <stop offset="1" stop-color="#cfc7b7"/>
    </linearGradient>
    <linearGradient id="whiteBrim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffef8"/>
      <stop offset="0.58" stop-color="#ece6d9"/>
      <stop offset="1" stop-color="#bdb4a5"/>
    </linearGradient>
    <radialGradient id="silver" cx="36%" cy="30%" r="72%">
      <stop offset="0" stop-color="#fffdf2"/>
      <stop offset="0.42" stop-color="#c9c7bf"/>
      <stop offset="1" stop-color="#565651"/>
    </radialGradient>
    <radialGradient id="turquoise" cx="35%" cy="30%" r="75%">
      <stop offset="0" stop-color="#9df7f0"/>
      <stop offset="0.5" stop-color="#16b6b4"/>
      <stop offset="1" stop-color="#087475"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#251605" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1400" height="900" rx="72" fill="#fff7e8"/>
  <circle cx="210" cy="172" r="150" fill="#ff6f91" opacity="0.14"/>
  <circle cx="1168" cy="236" r="190" fill="#219ebc" opacity="0.13"/>

  <g filter="url(#shadow)">
    <path d="M203 625c164 75 501 92 908 18" fill="none" stroke="#c67a16" stroke-width="25" stroke-linecap="round"/>
    <path d="M963 634c68 11 136 37 207 78" fill="none" stroke="#c67a16" stroke-width="17" stroke-linecap="round"/>
    <ellipse cx="1063" cy="697" rx="82" ry="48" fill="none" stroke="#c67a16" stroke-width="16" transform="rotate(18 1063 697)"/>

    <text x="176" y="510" fill="#251605" font-family="Cooper Black, Baloo 2, Arial Rounded MT Bold, system-ui, sans-serif" font-size="214" font-weight="900" letter-spacing="-14">Yippee</text>
    <text x="435" y="702" fill="url(#sunset)" stroke="#251605" stroke-width="7" paint-order="stroke fill" font-family="Cooper Black, Baloo 2, Arial Rounded MT Bold, system-ui, sans-serif" font-size="174" font-weight="900" letter-spacing="-7">Cafe</text>

    <!-- White concho reference: bright felt, tall smooth crown, wide curled brim, black band, silver conchos, turquoise accent beads. -->
    <g transform="translate(126 102) rotate(-6) scale(1.02)">
      <!-- left underside/curl -->
      <path d="M55 247c82-66 176-85 281-56 38 10 55 36 42 66-18 43-76 72-172 86-76 11-135-1-177-35-32-26-17-45 26-61z" fill="#c7bfb1" stroke="#251605" stroke-width="12" stroke-linejoin="round"/>
      <!-- very wide white brim with lifted tips, closer to the photo -->
      <path d="M33 254c108 43 255 59 440 48 172-10 329-38 477-80 71-20 126-5 144 30 18 36-30 67-123 82-242 40-447 59-628 45-160-12-282-39-366-89-46-27 0-59 56-36z" fill="url(#whiteBrim)" stroke="#251605" stroke-width="12" stroke-linejoin="round"/>
      <path d="M90 263c124 26 271 35 442 25 167-10 315-32 445-66" fill="none" stroke="#fffef8" stroke-width="12" stroke-linecap="round" opacity="0.82"/>
      <path d="M870 231c86-1 159 9 218 30" fill="none" stroke="#a9a094" stroke-width="9" stroke-linecap="round" opacity="0.5"/>
      <path d="M35 256c43-10 83-13 122-8" fill="none" stroke="#fffef8" stroke-width="11" stroke-linecap="round" opacity="0.72"/>

      <!-- high smooth crown, minimally creased -->
      <path d="M318 268c-10-80-8-153 5-220 11-56 51-89 114-96 99-12 207 10 257 48 37 29 50 69 45 121-6 66-3 116 13 150-107 30-332 29-434-3z" fill="url(#whiteFelt)" stroke="#251605" stroke-width="12" stroke-linejoin="round"/>
      <path d="M423 67c79 27 172 30 278 7" fill="none" stroke="#fffef8" stroke-width="17" stroke-linecap="round" opacity="0.8"/>
      <path d="M458 9c-39 47-56 103-52 168" fill="none" stroke="#bdb4a5" stroke-width="11" stroke-linecap="round" opacity="0.42"/>
      <path d="M608 17c35 49 49 104 40 166" fill="none" stroke="#bdb4a5" stroke-width="11" stroke-linecap="round" opacity="0.42"/>
      <path d="M319 268c101 30 327 31 431 1" fill="none" stroke="#fffef8" stroke-width="8" stroke-linecap="round" opacity="0.68"/>
      <path d="M356 148c42 8 82 6 119-7M584 151c43-7 82-4 118 8" fill="none" stroke="#cfc7b7" stroke-width="5" stroke-linecap="round" opacity="0.34"/>

      <!-- black band with oversized silver conchos and studs -->
      <path d="M329 249c91 29 299 31 407 2" fill="none" stroke="#14110f" stroke-width="31" stroke-linecap="round"/>
      <path d="M345 244c100 20 279 21 380 2" fill="none" stroke="#3a302a" stroke-width="7" stroke-linecap="round" opacity="0.82"/>

      <!-- conchos: larger, spaced, visible on both sides like reference -->
      <g stroke="#1e1e1c" stroke-width="3">
        <circle cx="346" cy="244" r="18" fill="url(#silver)"/>
        <circle cx="396" cy="251" r="9" fill="url(#silver)"/>
        <circle cx="446" cy="254" r="9" fill="url(#silver)"/>
        <circle cx="496" cy="255" r="9" fill="url(#silver)"/>
        <circle cx="546" cy="253" r="9" fill="url(#silver)"/>
        <circle cx="596" cy="249" r="9" fill="url(#silver)"/>
        <circle cx="646" cy="242" r="9" fill="url(#silver)"/>
        <circle cx="703" cy="233" r="18" fill="url(#silver)"/>
      </g>
      <g fill="#1f1f1c" opacity="0.62">
        <circle cx="346" cy="244" r="4"/><circle cx="396" cy="251" r="2.8"/><circle cx="446" cy="254" r="2.8"/><circle cx="496" cy="255" r="2.8"/><circle cx="546" cy="253" r="2.8"/><circle cx="596" cy="249" r="2.8"/><circle cx="646" cy="242" r="2.8"/><circle cx="703" cy="233" r="4"/>
      </g>

      <!-- turquoise accent borrowed from western styling in the image, kept tiny so the hat doesn't get noisy -->
      <g stroke="#064b4c" stroke-width="2">
        <circle cx="420" cy="271" r="6" fill="url(#turquoise)"/>
        <circle cx="470" cy="275" r="6" fill="url(#turquoise)"/>
        <circle cx="520" cy="275" r="6" fill="url(#turquoise)"/>
        <circle cx="570" cy="272" r="6" fill="url(#turquoise)"/>
        <circle cx="620" cy="267" r="6" fill="url(#turquoise)"/>
      </g>
    </g>
  </g>

  <text x="700" y="812" text-anchor="middle" fill="#6c4a1f" font-family="Inter, Avenir Next, system-ui, sans-serif" font-size="34" font-weight="900" letter-spacing="5">PLAYFUL APPS • GAMES • TOOLS</text>
</svg>
