<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">Yippee Cafe cowboy hat style study</title>
  <desc id="desc">A study sheet with six different cowboy hat styles for the Yippee Cafe brand.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#251605" flood-opacity="0.18"/>
    </filter>
    <style>
      .label { font: 900 34px Inter, Avenir Next, system-ui, sans-serif; fill: #251605; letter-spacing: .04em; }
      .note { font: 700 22px Inter, Avenir Next, system-ui, sans-serif; fill: #6c4a1f; }
      .card { fill: rgba(255,255,255,.72); stroke: rgba(37,22,5,.14); stroke-width: 4; }
      .outline { stroke: #251605; stroke-width: 14; stroke-linejoin: round; stroke-linecap: round; }
      .band { fill: none; stroke: #fb8500; stroke-width: 22; stroke-linecap: round; }
    </style>
  </defs>
  <rect width="1600" height="1200" rx="80" fill="#fff7e8"/>
  <circle cx="180" cy="160" r="150" fill="#ff6f91" opacity=".14"/>
  <circle cx="1410" cy="190" r="190" fill="#219ebc" opacity=".13"/>
  <text x="800" y="86" text-anchor="middle" font-family="Cooper Black, Baloo 2, Arial Rounded MT Bold, system-ui, sans-serif" font-size="64" font-weight="900" fill="#251605">Yippee Cafe Hat Styles</text>
  <text x="800" y="130" text-anchor="middle" class="note">Goal: cute brand accent, not muddy cowboy clipart</text>

  <!-- Cards -->
  <g transform="translate(70 180)">
    <rect class="card" width="450" height="430" rx="44"/>
    <g transform="translate(50 92)" filter="url(#shadow)">
      <!-- Soft café tan -->
      <path class="outline" d="M79 122c35-58 86-87 154-87 55 0 86 33 121 33 23 0 47-13 69-3 31 14 49 45 55 91-103 17-227 10-399-34z" fill="#ffe6b3"/>
      <path class="band" d="M112 122c75 25 178 36 317 19"/>
      <path class="outline" d="M0 147c119 49 294 62 536 25 34-5 54 28 30 52-50 51-151 76-304 73-130-3-229-27-296-72-33-22-8-93 34-78z" fill="#ffd27b"/>
    </g>
    <text x="225" y="334" text-anchor="middle" class="label">1. Café Tan</text>
    <text x="225" y="370" text-anchor="middle" class="note">warm, friendly, safest</text>
  </g>

  <g transform="translate(575 180)">
    <rect class="card" width="450" height="430" rx="44"/>
    <g transform="translate(62 116)" filter="url(#shadow)">
      <!-- Toy hat / rounded -->
      <path class="outline" d="M95 115c29-43 72-65 128-65 46 0 72 26 99 26 22 0 45-11 64-2 26 12 41 39 45 75-91 14-200 8-336-34z" fill="#fff0c4"/>
      <path d="M122 114c65 19 156 27 277 13" fill="none" stroke="#ff6f91" stroke-width="20" stroke-linecap="round"/>
      <path class="outline" d="M30 141c95 39 241 51 449 18 27-4 43 22 24 42-39 41-121 61-245 59-108-2-193-21-250-58-27-18-12-74 22-61z" fill="#ffe0a3"/>
    </g>
    <text x="225" y="334" text-anchor="middle" class="label">2. Toy Rounded</text>
    <text x="225" y="370" text-anchor="middle" class="note">mascot/app icon friendly</text>
  </g>

  <g transform="translate(1080 180)">
    <rect class="card" width="450" height="430" rx="44"/>
    <g transform="translate(45 104)" filter="url(#shadow)">
      <!-- Rodeo silhouette -->
      <path class="outline" d="M74 136c46-72 112-108 196-108 62 0 98 39 136 39 31 0 62-21 92-7 41 18 65 58 74 120-129 21-282 13-498-44z" fill="#a85f21"/>
      <path d="M114 136c88 31 208 45 374 26" fill="none" stroke="#ffcf33" stroke-width="24" stroke-linecap="round"/>
      <path class="outline" d="M0 164c145 60 360 75 656 29 40-6 64 32 37 61-58 61-181 91-367 87-158-3-281-34-365-91-40-27-13-104 39-86z" fill="#8b4a17"/>
    </g>
    <text x="225" y="334" text-anchor="middle" class="label">3. Rodeo Classic</text>
    <text x="225" y="370" text-anchor="middle" class="note">most western, heaviest</text>
  </g>

  <g transform="translate(70 660)">
    <rect class="card" width="450" height="430" rx="44"/>
    <g transform="translate(55 95)" filter="url(#shadow)">
      <!-- Modern flat icon -->
      <path d="M110 142c35-62 83-92 144-92 52 0 80 31 113 31 22 0 44-11 64-2 28 13 44 43 48 88-93 16-217 7-369-25z" fill="#ffe6b3" stroke="#251605" stroke-width="18" stroke-linejoin="round"/>
      <path d="M134 142h296" stroke="#fb8500" stroke-width="24" stroke-linecap="round"/>
      <path d="M10 168c113 38 287 48 522 13 30-4 47 25 25 46-49 46-151 67-305 64-129-3-227-24-292-63-31-19-5-74 50-60z" fill="#ffd27b" stroke="#251605" stroke-width="18" stroke-linejoin="round"/>
    </g>
    <text x="225" y="334" text-anchor="middle" class="label">4. Flat Icon</text>
    <text x="225" y="370" text-anchor="middle" class="note">cleanest at small size</text>
  </g>

  <g transform="translate(575 660)">
    <rect class="card" width="450" height="430" rx="44"/>
    <g transform="translate(54 100)" filter="url(#shadow)">
      <!-- Foam hat / cafe hybrid -->
      <path class="outline" d="M91 131c40-50 96-76 165-76 58 0 88 29 119 29 21 0 43-10 64 0 27 13 44 42 51 84-105 14-233 2-399-37z" fill="#fff8e8"/>
      <path d="M125 130c75 19 178 26 315 10" fill="none" stroke="#ffb703" stroke-width="24" stroke-linecap="round"/>
      <path class="outline" d="M0 162c126 38 314 43 566 7 35-5 54 29 29 54-54 53-162 76-324 71-138-4-244-28-316-71-35-21 5-77 45-61z" fill="#ffe9ad"/>
      <path d="M130 218c41 24 91 35 150 34" fill="none" stroke="#fb8500" stroke-width="12" stroke-linecap="round" opacity=".55"/>
    </g>
    <text x="225" y="334" text-anchor="middle" class="label">5. Foam Hat</text>
    <text x="225" y="370" text-anchor="middle" class="note">café-first, subtle western</text>
  </g>

  <g transform="translate(1080 660)">
    <rect class="card" width="450" height="430" rx="44"/>
    <g transform="translate(70 105)" filter="url(#shadow)">
      <!-- Tiny accent hat on Y -->
      <text x="150" y="208" text-anchor="middle" fill="#251605" font-family="Cooper Black, Baloo 2, Arial Rounded MT Bold, system-ui, sans-serif" font-size="230" font-weight="900">Y</text>
      <g transform="translate(64 10) rotate(-13) scale(.58)">
        <path d="M100 124c28-46 70-69 128-69 47 0 71 27 102 27 20 0 40-10 58-2 25 12 39 37 43 75-90 14-196 8-331-31z" fill="#ffe3a3" stroke="#251605" stroke-width="13" stroke-linejoin="round"/>
        <path d="M124 124c64 21 154 30 272 16" fill="none" stroke="#fb8500" stroke-width="19" stroke-linecap="round"/>
        <path d="M35 139c101 42 254 55 466 22 28-4 44 23 25 42-40 40-125 61-255 59-113-2-200-22-260-60-28-18-11-76 24-63z" fill="#ffd27b" stroke="#251605" stroke-width="13" stroke-linejoin="round"/>
      </g>
    </g>
    <text x="225" y="334" text-anchor="middle" class="label">6. Tiny Accent</text>
    <text x="225" y="370" text-anchor="middle" class="note">best if hat stays optional</text>
  </g>
</svg>
