<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">Yippee Cafe logo concept 6 - cafe-forward cup</title>
  <desc id="desc">A cafe-forward Yippee Cafe logo where the hat becomes a soft cup lid/foam accent, with lasso steam.</desc>
  <defs>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffcf33"/>
      <stop offset="0.55" stop-color="#fb8500"/>
      <stop offset="1" stop-color="#ff6f91"/>
    </linearGradient>
    <linearGradient id="cup" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff"/>
      <stop offset="1" stop-color="#fff0c4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#251605" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="1200" height="1200" rx="112" fill="#fff7e8"/>
  <circle cx="210" cy="180" r="132" fill="#ff6f91" opacity="0.16"/>
  <circle cx="1015" cy="228" r="166" fill="#219ebc" opacity="0.14"/>

  <g filter="url(#shadow)">
    <!-- Lasso steam -->
    <path d="M424 258c-89-68-62-151 52-170 152-25 285 73 244 165-34 76-164 75-230 18-35-30-31-72 11-88 61-24 124 11 132 58" fill="none" stroke="#c67a16" stroke-width="23" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M708 244c73 36 140 90 200 160" fill="none" stroke="#c67a16" stroke-width="18" stroke-linecap="round"/>

    <!-- Cup with hat-as-lid -->
    <path d="M330 455h470l-56 392c-16 111-111 193-225 193h-18c-114 0-209-82-225-193l-56-392h110z" fill="url(#cup)" stroke="#251605" stroke-width="22" stroke-linejoin="round"/>
    <path d="M802 550h80c83 0 147 67 137 147-10 75-75 131-151 131H767" fill="none" stroke="#251605" stroke-width="22" stroke-linecap="round"/>
    <path d="M330 558h470" stroke="url(#warm)" stroke-width="54" stroke-linecap="round"/>

    <!-- Softer hat/lid: reads cafe-first, western-second -->
    <g transform="translate(236 340)">
      <path d="M169 99c45-58 107-88 186-88 61 0 96 30 130 30 24 0 50-14 75-2 34 16 56 50 64 99-121 18-267 9-455-39z" fill="#ffe9b8" stroke="#251605" stroke-width="17" stroke-linejoin="round"/>
      <path d="M205 100c85 26 205 36 367 18" fill="none" stroke="#fb8500" stroke-width="28" stroke-linecap="round"/>
      <path d="M79 124c143 48 353 58 632 15 40-6 63 31 36 59-59 59-180 89-362 89-159 0-281-25-366-75-42-25-17-105 60-88z" fill="#ffe0a3" stroke="#251605" stroke-width="17" stroke-linejoin="round"/>
    </g>

    <circle cx="460" cy="690" r="17" fill="#251605"/>
    <circle cx="621" cy="690" r="17" fill="#251605"/>
    <path d="M488 773c42 37 100 37 145 0" fill="none" stroke="#251605" stroke-width="16" stroke-linecap="round"/>
  </g>

  <text x="600" y="254" text-anchor="middle" fill="#251605" font-family="Cooper Black, Baloo 2, Arial Rounded MT Bold, system-ui, sans-serif" font-size="116" font-weight="900" letter-spacing="-7">Yippee</text>
  <text x="600" y="1140" text-anchor="middle" fill="url(#warm)" stroke="#251605" stroke-width="5" paint-order="stroke fill" font-family="Cooper Black, Baloo 2, Arial Rounded MT Bold, system-ui, sans-serif" font-size="104" font-weight="900" letter-spacing="-5">Cafe</text>
</svg>
