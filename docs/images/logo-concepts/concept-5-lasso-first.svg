<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Yippee Cafe logo concept 5 - lasso first</title>
  <desc id="desc">A lasso-first Yippee Cafe logo that minimizes the cowboy hat and uses the rope as the main western cue.</desc>
  <defs>
    <linearGradient id="sunset" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffbe0b"/>
      <stop offset="0.55" stop-color="#fb8500"/>
      <stop offset="1" stop-color="#ff6f91"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#251605" flood-opacity="0.19"/>
    </filter>
  </defs>
  <rect width="1400" height="900" rx="72" fill="#fff7e8"/>
  <path d="M138 226c150-82 292-79 428 9 159 103 304 114 435 35 87-52 160-55 222-8" fill="none" stroke="#219ebc" stroke-width="22" stroke-linecap="round" opacity="0.22"/>
  <g filter="url(#shadow)">
    <ellipse cx="696" cy="440" rx="446" ry="210" fill="none" stroke="#c67a16" stroke-width="30" transform="rotate(-9 696 440)"/>
    <path d="M996 570c91 21 179 67 265 138" fill="none" stroke="#c67a16" stroke-width="24" stroke-linecap="round"/>
    <path d="M1038 579c-27 34-33 73-18 117" fill="none" stroke="#c67a16" stroke-width="17" stroke-linecap="round"/>

    <text x="696" y="500" text-anchor="middle" fill="#251605" font-family="Cooper Black, Baloo 2, Arial Rounded MT Bold, system-ui, sans-serif" font-size="224" font-weight="900" letter-spacing="-15">Yippee</text>
    <text x="704" y="686" text-anchor="middle" fill="url(#sunset)" stroke="#251605" stroke-width="7" paint-order="stroke fill" font-family="Cooper Black, Baloo 2, Arial Rounded MT Bold, system-ui, sans-serif" font-size="158" font-weight="900" letter-spacing="-6">Cafe</text>

    <!-- Tiny optional hat accent, intentionally not the hero -->
    <g transform="translate(889 247) rotate(9) scale(.62)">
      <path d="M100 124c28-46 70-69 128-69 47 0 71 27 102 27 20 0 40-10 58-2 25 12 39 37 43 75-90 14-196 8-331-31z" fill="#ffe3a3" stroke="#251605" stroke-width="13" stroke-linejoin="round"/>
      <path d="M124 124c64 21 154 30 272 16" fill="none" stroke="#fb8500" stroke-width="19" stroke-linecap="round"/>
      <path d="M35 139c101 42 254 55 466 22 28-4 44 23 25 42-40 40-125 61-255 59-113-2-200-22-260-60-28-18-11-76 24-63z" fill="#ffd27b" stroke="#251605" stroke-width="13" stroke-linejoin="round"/>
    </g>
  </g>
  <text x="700" y="806" text-anchor="middle" fill="#6c4a1f" font-family="Inter, Avenir Next, system-ui, sans-serif" font-size="34" font-weight="900" letter-spacing="5">YEEHAW, BUT MAKE IT SOFTWARE</text>
</svg>
