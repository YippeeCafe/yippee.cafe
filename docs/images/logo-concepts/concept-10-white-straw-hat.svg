<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Yippee Cafe logo concept 10 - white straw cowboy hat</title>
  <desc id="desc">A Yippee Cafe wordmark using a bright white straw cowboy hat inspired by the reference: tall pinched crown, perforation details, studded brown band, and curled wide brim.</desc>
  <defs>
    <linearGradient id="sunset" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffcf33"/>
      <stop offset="0.58" stop-color="#fb8500"/>
      <stop offset="1" stop-color="#ff6f91"/>
    </linearGradient>
    <linearGradient id="straw" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdf0"/>
      <stop offset="0.45" stop-color="#f7efcf"/>
      <stop offset="1" stop-color="#e4d4a6"/>
    </linearGradient>
    <linearGradient id="brim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffbe8"/>
      <stop offset="0.55" stop-color="#efe1b5"/>
      <stop offset="1" stop-color="#d6bf86"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#251605" flood-opacity="0.18"/>
    </filter>
    <pattern id="strawDots" width="18" height="12" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="1.7" fill="#9f8752" opacity="0.42"/>
      <circle cx="13" cy="9" r="1.3" fill="#9f8752" opacity="0.32"/>
    </pattern>
  </defs>
  <rect width="1400" height="900" rx="72" fill="#fff7e8"/>
  <circle cx="210" cy="172" r="150" fill="#ff6f91" opacity="0.14"/>
  <circle cx="1168" cy="236" r="190" fill="#219ebc" opacity="0.13"/>

  <g filter="url(#shadow)">
    <path d="M203 625c164 75 501 92 908 18" fill="none" stroke="#c67a16" stroke-width="25" stroke-linecap="round"/>
    <path d="M963 634c68 11 136 37 207 78" fill="none" stroke="#c67a16" stroke-width="17" stroke-linecap="round"/>
    <ellipse cx="1063" cy="697" rx="82" ry="48" fill="none" stroke="#c67a16" stroke-width="16" transform="rotate(18 1063 697)"/>

    <text x="176" y="510" fill="#251605" font-family="Cooper Black, Baloo 2, Arial Rounded MT Bold, system-ui, sans-serif" font-size="214" font-weight="900" letter-spacing="-14">Yippee</text>
    <text x="435" y="702" fill="url(#sunset)" stroke="#251605" stroke-width="7" paint-order="stroke fill" font-family="Cooper Black, Baloo 2, Arial Rounded MT Bold, system-ui, sans-serif" font-size="174" font-weight="900" letter-spacing="-7">Cafe</text>

    <!-- White straw reference: tall crown, high curled brim, brown studded band, perforation rows. -->
    <g transform="translate(154 112) rotate(-8) scale(.98)">
      <!-- left brim curl / underside -->
      <path d="M61 226c71-60 147-78 229-54 32 9 44 31 30 58-21 41-72 66-151 74-59 6-104-5-137-34-24-21-12-35 29-44z" fill="#d7c08a" stroke="#251605" stroke-width="12" stroke-linejoin="round"/>
      <!-- main brim: wide, asymmetric, both sides curling upward -->
      <path d="M52 236c98 48 230 69 396 62 151-7 283-33 412-78 60-21 109-10 126 21 17 31-20 66-98 82-205 42-380 63-544 51-149-11-265-43-346-96-41-27 8-65 54-42z" fill="url(#brim)" stroke="#251605" stroke-width="12" stroke-linejoin="round"/>
      <path d="M104 252c108 31 231 43 368 34 151-10 281-33 392-69" fill="none" stroke="#fffdf0" stroke-width="11" stroke-linecap="round" opacity="0.72"/>
      <path d="M817 226c69-1 127 8 175 29" fill="none" stroke="#b89a5c" stroke-width="9" stroke-linecap="round" opacity="0.48"/>

      <!-- crown: tall, pinched, white straw -->
      <path d="M285 257c-2-66 0-132 7-198 6-56 42-90 99-100 90-15 186 2 230 36 32 25 43 61 39 110-6 62-7 111 6 151-94 30-290 30-381 1z" fill="url(#straw)" stroke="#251605" stroke-width="12" stroke-linejoin="round"/>
      <!-- center crease and side pinches -->
      <path d="M432 7c-44 46-63 101-58 165" fill="none" stroke="#a58a53" stroke-width="12" stroke-linecap="round" opacity="0.5"/>
      <path d="M552 16c41 47 56 100 47 160" fill="none" stroke="#a58a53" stroke-width="12" stroke-linecap="round" opacity="0.5"/>
      <path d="M397 62c57 24 122 27 194 6" fill="none" stroke="#fffdf4" stroke-width="14" stroke-linecap="round" opacity="0.76"/>
      <!-- perforated rows like the reference -->
      <path d="M338 85c67 18 160 25 276 11" fill="none" stroke="#7b673d" stroke-width="5" stroke-linecap="round" stroke-dasharray="1 13" opacity="0.8"/>
      <path d="M329 105c76 20 176 27 302 10" fill="none" stroke="#7b673d" stroke-width="5" stroke-linecap="round" stroke-dasharray="1 13" opacity="0.72"/>
      <path d="M349 126c61 13 144 17 250 6" fill="none" stroke="#7b673d" stroke-width="5" stroke-linecap="round" stroke-dasharray="1 13" opacity="0.62"/>
      <path d="M286 256c88 28 288 28 379 0" fill="none" stroke="#fdf7df" stroke-width="8" stroke-linecap="round" opacity="0.62"/>

      <!-- brown band integrated into crown base, with silver studs -->
      <path d="M300 238c78 25 254 28 348 2" fill="none" stroke="#704019" stroke-width="27" stroke-linecap="round"/>
      <path d="M313 232c82 18 229 19 318 2" fill="none" stroke="#a46a2e" stroke-width="7" stroke-linecap="round" opacity="0.72"/>
      <g fill="#f7f2df" stroke="#6a5f49" stroke-width="2" opacity="0.95">
        <circle cx="350" cy="238" r="6"/>
        <circle cx="394" cy="244" r="6"/>
        <circle cx="438" cy="247" r="6"/>
        <circle cx="482" cy="247" r="6"/>
        <circle cx="526" cy="245" r="6"/>
        <circle cx="570" cy="241" r="6"/>
        <circle cx="614" cy="235" r="6"/>
      </g>
      <!-- straw texture overlay clipped roughly to crown area by being subtle over the crown -->
      <path d="M300 70c70 13 205 13 340-4l11 152c-102 25-254 25-358 0z" fill="url(#strawDots)" opacity="0.25"/>
    </g>
  </g>

  <text x="700" y="812" text-anchor="middle" fill="#6c4a1f" font-family="Inter, Avenir Next, system-ui, sans-serif" font-size="34" font-weight="900" letter-spacing="5">PLAYFUL APPS • GAMES • TOOLS</text>
</svg>
