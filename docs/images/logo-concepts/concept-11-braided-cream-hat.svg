<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Yippee Cafe logo concept 11 - braided cream cowboy hat</title>
  <desc id="desc">A Yippee Cafe wordmark using a cream cowboy hat inspired by the reference: high pinched crown, wide brim, braided band, bead accents, and side tassels.</desc>
  <defs>
    <linearGradient id="sunset" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffcf33"/>
      <stop offset="0.58" stop-color="#fb8500"/>
      <stop offset="1" stop-color="#ff6f91"/>
    </linearGradient>
    <linearGradient id="felt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdf1"/>
      <stop offset="0.5" stop-color="#f1e8cc"/>
      <stop offset="1" stop-color="#d4c49c"/>
    </linearGradient>
    <linearGradient id="feltDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5edd4"/>
      <stop offset="0.55" stop-color="#e1d2a9"/>
      <stop offset="1" stop-color="#bda77a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#251605" flood-opacity="0.18"/>
    </filter>
    <pattern id="braid" width="34" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(-8)">
      <path d="M-4 14L12 0M10 14L26 0M24 14L40 0" stroke="#2f2418" stroke-width="5" stroke-linecap="round"/>
      <path d="M-6 0L10 14M8 0L24 14M22 0L38 14" stroke="#caa86b" stroke-width="4" stroke-linecap="round"/>
    </pattern>
  </defs>
  <rect width="1400" height="900" rx="72" fill="#fff7e8"/>
  <circle cx="210" cy="172" r="150" fill="#ff6f91" opacity="0.14"/>
  <circle cx="1168" cy="236" r="190" fill="#219ebc" opacity="0.13"/>

  <g filter="url(#shadow)">
    <path d="M203 625c164 75 501 92 908 18" fill="none" stroke="#c67a16" stroke-width="25" stroke-linecap="round"/>
    <path d="M963 634c68 11 136 37 207 78" fill="none" stroke="#c67a16" stroke-width="17" stroke-linecap="round"/>
    <ellipse cx="1063" cy="697" rx="82" ry="48" fill="none" stroke="#c67a16" stroke-width="16" transform="rotate(18 1063 697)"/>

    <text x="176" y="510" fill="#251605" font-family="Cooper Black, Baloo 2, Arial Rounded MT Bold, system-ui, sans-serif" font-size="214" font-weight="900" letter-spacing="-14">Yippee</text>
    <text x="435" y="702" fill="url(#sunset)" stroke="#251605" stroke-width="7" paint-order="stroke fill" font-family="Cooper Black, Baloo 2, Arial Rounded MT Bold, system-ui, sans-serif" font-size="174" font-weight="900" letter-spacing="-7">Cafe</text>

    <!-- Cream felt reference: high pinched crown, wide brim, braided leather band, bead accents, and tassels. -->
    <g transform="translate(150 106) rotate(-8) scale(.98)">
      <!-- left underside / brim curl -->
      <path d="M58 232c78-66 167-86 268-58 36 10 50 34 37 64-18 42-72 71-162 84-70 10-123-2-160-36-27-25-15-39 17-54z" fill="#cbb78d" stroke="#251605" stroke-width="12" stroke-linejoin="round"/>
      <!-- wide cream brim, flatter and broader like the reference -->
      <path d="M42 236c101 45 237 64 406 55 155-8 300-36 432-77 64-20 112-8 126 22 16 35-27 66-109 82-214 41-394 62-560 50-148-11-262-39-342-89-42-27-2-64 47-43z" fill="url(#feltDark)" stroke="#251605" stroke-width="12" stroke-linejoin="round"/>
      <path d="M92 248c113 28 245 39 396 30 148-9 279-32 395-67" fill="none" stroke="#fffdf1" stroke-width="11" stroke-linecap="round" opacity="0.7"/>
      <path d="M806 220c76 0 140 9 191 29" fill="none" stroke="#aa956c" stroke-width="9" stroke-linecap="round" opacity="0.45"/>

      <!-- high pinched crown integrated into brim -->
      <path d="M288 260c-5-70-3-137 7-203 8-54 44-87 101-95 92-12 190 8 234 43 33 26 44 63 39 112-7 62-6 110 7 143-96 30-295 30-388 0z" fill="url(#felt)" stroke="#251605" stroke-width="12" stroke-linejoin="round"/>
      <path d="M435 8c-45 46-67 103-64 172" fill="none" stroke="#a58a53" stroke-width="12" stroke-linecap="round" opacity="0.44"/>
      <path d="M556 18c41 49 58 103 50 164" fill="none" stroke="#a58a53" stroke-width="12" stroke-linecap="round" opacity="0.44"/>
      <path d="M395 62c62 25 134 29 216 8" fill="none" stroke="#fffdf4" stroke-width="14" stroke-linecap="round" opacity="0.72"/>
      <path d="M290 260c91 28 291 28 385 0" fill="none" stroke="#fff8df" stroke-width="8" stroke-linecap="round" opacity="0.62"/>

      <!-- braided band: stronger black/tan woven cue from the reference -->
      <path d="M302 239c80 26 263 29 359 2" fill="none" stroke="#3a2a1b" stroke-width="30" stroke-linecap="round"/>
      <path d="M305 238c80 25 258 27 353 2" fill="none" stroke="url(#braid)" stroke-width="24" stroke-linecap="round"/>
      <path d="M314 230c86 18 239 20 332 2" fill="none" stroke="#f0d7a0" stroke-width="6" stroke-linecap="round" opacity="0.48"/>

      <!-- bead/stud accents -->
      <g fill="#f7f1dc" stroke="#3b3021" stroke-width="2" opacity="0.96">
        <circle cx="344" cy="238" r="5.5"/>
        <circle cx="392" cy="245" r="5.5"/>
        <circle cx="440" cy="248" r="5.5"/>
        <circle cx="488" cy="248" r="5.5"/>
        <circle cx="536" cy="245" r="5.5"/>
        <circle cx="584" cy="240" r="5.5"/>
        <circle cx="632" cy="233" r="5.5"/>
      </g>

      <!-- right-side hanging tassels like the photo, simplified so they do not get noisy -->
      <g stroke-linecap="round" stroke-linejoin="round">
        <path d="M635 246c42 9 75 27 100 54" fill="none" stroke="#2f2418" stroke-width="8"/>
        <path d="M652 243c46 18 85 45 118 82" fill="none" stroke="#caa86b" stroke-width="5"/>
        <path d="M620 250c55 27 101 59 137 98" fill="none" stroke="#2f2418" stroke-width="5"/>
        <circle cx="735" cy="300" r="8" fill="#f0d7a0" stroke="#3b3021" stroke-width="2"/>
        <circle cx="771" cy="325" r="8" fill="#f0d7a0" stroke="#3b3021" stroke-width="2"/>
        <circle cx="757" cy="348" r="7" fill="#2f2418" opacity="0.86"/>
      </g>

      <!-- tiny felt scuffs/texture -->
      <path d="M548 150c28-8 56-6 84 5M330 151c30 5 54 2 72-8M472 205c43 8 84 7 123-5" fill="none" stroke="#bba77c" stroke-width="5" stroke-linecap="round" opacity="0.36"/>
    </g>
  </g>

  <text x="700" y="812" text-anchor="middle" fill="#6c4a1f" font-family="Inter, Avenir Next, system-ui, sans-serif" font-size="34" font-weight="900" letter-spacing="5">PLAYFUL APPS • GAMES • TOOLS</text>
</svg>
