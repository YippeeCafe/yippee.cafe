<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Yippee Cafe logo concept 8 - fused narrow pinched cowboy hat</title>
  <desc id="desc">A Yippee Cafe wordmark with a fused narrower pinched cowboy hat crown, wider brim, and lasso underline.</desc>
  <defs>
    <linearGradient id="sunset" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffcf33"/>
      <stop offset="0.58" stop-color="#fb8500"/>
      <stop offset="1" stop-color="#ff6f91"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#251605" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1400" height="900" rx="72" fill="#fff7e8"/>
  <circle cx="220" cy="172" r="150" fill="#ff6f91" opacity="0.14"/>
  <circle cx="1168" cy="236" r="190" fill="#219ebc" opacity="0.13"/>

  <g filter="url(#shadow)">
    <path d="M203 625c164 75 501 92 908 18" fill="none" stroke="#c67a16" stroke-width="25" stroke-linecap="round"/>
    <path d="M963 634c68 11 136 37 207 78" fill="none" stroke="#c67a16" stroke-width="17" stroke-linecap="round"/>
    <ellipse cx="1063" cy="697" rx="82" ry="48" fill="none" stroke="#c67a16" stroke-width="16" transform="rotate(18 1063 697)"/>

    <text x="176" y="510" fill="#251605" font-family="Cooper Black, Baloo 2, Arial Rounded MT Bold, system-ui, sans-serif" font-size="214" font-weight="900" letter-spacing="-14">Yippee</text>
    <text x="435" y="702" fill="url(#sunset)" stroke="#251605" stroke-width="7" paint-order="stroke fill" font-family="Cooper Black, Baloo 2, Arial Rounded MT Bold, system-ui, sans-serif" font-size="174" font-weight="900" letter-spacing="-7">Cafe</text>

    <!-- Narrower cowboy hat: smaller crown, clear pinch, wider brim. -->
    <g transform="translate(200 154) rotate(-10)">
      <!-- crown is deliberately narrower than brim -->
      <path d="M190 154c12-72 45-117 101-135 24-8 47 4 65 4 18 0 40-14 67-7 58 14 91 63 104 144-75 20-194 18-337-6z" fill="#ffe6b3" stroke="#251605" stroke-width="14" stroke-linejoin="round"/>
      <!-- pinched cattleman-style crease -->
      <path d="M270 42c22 42 31 83 27 124M446 42c-22 42-31 83-27 124" fill="none" stroke="#d9952b" stroke-width="13" stroke-linecap="round" opacity="0.62"/>
      <path d="M229 151c72 20 159 26 262 10" fill="none" stroke="#fb8500" stroke-width="23" stroke-linecap="round"/>
      <!-- brim is broad and flatter with upturned tips -->
      <path d="M31 178c92 46 218 68 378 66 126-2 230-22 315-59 42-18 68 34 38 70-53 64-174 98-361 102-175 4-309-22-401-79-45-28-15-121 31-100z" fill="#ffd27b" stroke="#251605" stroke-width="14" stroke-linejoin="round"/>
      <path d="M63 190c74 28 178 44 313 47 149 3 266-13 352-48" fill="none" stroke="#fff0c4" stroke-width="12" stroke-linecap="round" opacity="0.7"/>
    </g>
  </g>

  <text x="700" y="812" text-anchor="middle" fill="#6c4a1f" font-family="Inter, Avenir Next, system-ui, sans-serif" font-size="34" font-weight="900" letter-spacing="5">PLAYFUL APPS • GAMES • TOOLS</text>
</svg>
