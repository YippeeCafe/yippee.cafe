<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-labelledby="title desc">
  <title id="title">Yippee Cafe tough nice mug mascot with locked hat</title>
  <desc id="desc">A simpler Yippee Cafe mascot concept: a confident coffee mug with a tough-but-friendly smirk, wearing the locked cream cowboy hat with a restrained lasso accent.</desc>
  <defs>
    <linearGradient id="mug" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdf7"/>
      <stop offset="0.56" stop-color="#fff0c9"/>
      <stop offset="1" stop-color="#d5ae6d"/>
    </linearGradient>
    <linearGradient id="coffee" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7a4218"/>
      <stop offset="1" stop-color="#2a1408"/>
    </linearGradient>
    <linearGradient id="felt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdf3"/>
      <stop offset="0.58" stop-color="#efe2c7"/>
      <stop offset="1" stop-color="#c6a86f"/>
    </linearGradient>
    <linearGradient id="brim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff9e8"/>
      <stop offset="0.52" stop-color="#e8d2a3"/>
      <stop offset="1" stop-color="#9a6a2d"/>
    </linearGradient>
    <linearGradient id="rope" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe08a"/>
      <stop offset="0.52" stop-color="#d98b20"/>
      <stop offset="1" stop-color="#7a3b0d"/>
    </linearGradient>
    <radialGradient id="eye" cx="34%" cy="25%" r="70%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.20" stop-color="#16110d"/>
      <stop offset="1" stop-color="#020101"/>
    </radialGradient>
    <radialGradient id="silver" cx="35%" cy="28%" r="75%">
      <stop offset="0" stop-color="#fffef7"/>
      <stop offset="0.46" stop-color="#d4d1c6"/>
      <stop offset="1" stop-color="#4a4841"/>
    </radialGradient>
    <radialGradient id="turquoise" cx="35%" cy="28%" r="75%">
      <stop offset="0" stop-color="#d7fff8"/>
      <stop offset="0.52" stop-color="#3ec2bc"/>
      <stop offset="1" stop-color="#095a56"/>
    </radialGradient>
    <filter id="lift" x="-14%" y="-14%" width="128%" height="128%">
      <feDropShadow dx="0" dy="12" stdDeviation="8" flood-color="#2b1805" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="600" height="600" fill="#ffffff"/>

  <!-- Just two steam wisps; the character should not feel cluttered. -->
  <g fill="none" stroke="#6f3d16" stroke-width="10" stroke-linecap="round" opacity="0.42">
    <path d="M221 185 C191 143 249 131 221 91"/>
    <path d="M378 184 C349 145 406 132 379 94"/>
  </g>

  <!-- Restrained lasso: small supporting accent, not a second character. -->
  <g filter="url(#lift)">
    <path d="M410 371 C455 410 526 382 523 326 C520 278 459 259 426 296 C397 329 417 371 457 368" fill="none" stroke="#6f360d" stroke-width="21" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M410 371 C455 410 526 382 523 326 C520 278 459 259 426 296 C397 329 417 371 457 368" fill="none" stroke="url(#rope)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M427 397 C347 435 206 433 122 382" fill="none" stroke="#6f360d" stroke-width="17" stroke-linecap="round"/>
    <path d="M427 397 C347 435 206 433 122 382" fill="none" stroke="url(#rope)" stroke-width="9" stroke-linecap="round"/>
  </g>

  <!-- Mug body: simplified silhouette and face. -->
  <g filter="url(#lift)">
    <path d="M153 255 C153 221 180 201 223 201 H353 C397 201 424 221 424 255 V350 C424 429 373 475 288 475 C203 475 153 429 153 350Z" fill="url(#mug)" stroke="#211506" stroke-width="15" stroke-linejoin="round"/>
    <path d="M421 270 H461 C524 270 542 351 490 388 C465 406 438 402 421 382" fill="none" stroke="#211506" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M184 239 C226 257 335 258 390 238" fill="none" stroke="url(#coffee)" stroke-width="16" stroke-linecap="round"/>

    <!-- Tough guy cowboy, still nice: one wink, one focused eye, strong asymmetric brows. -->
    <path d="M210 313 C238 294 264 294 289 309" fill="none" stroke="#211506" stroke-width="14" stroke-linecap="round"/>
    <path d="M324 300 C352 287 380 292 405 314" fill="none" stroke="#211506" stroke-width="14" stroke-linecap="round"/>
    <path d="M229 344 C246 333 265 335 279 348" fill="none" stroke="#211506" stroke-width="11" stroke-linecap="round"/>
    <ellipse cx="355" cy="344" rx="16" ry="20" fill="url(#eye)" stroke="#080403" stroke-width="5"/>
    <circle cx="349" cy="336" r="4" fill="#ffffff" opacity="0.9"/>

    <!-- Confident flat smirk: readable at small sizes, less busy than teeth/details. -->
    <path d="M235 401 C275 418 334 411 374 381" fill="none" stroke="#211506" stroke-width="14" stroke-linecap="round"/>
    <path d="M371 381 C386 379 398 383 407 394" fill="none" stroke="#211506" stroke-width="9" stroke-linecap="round"/>
  </g>

  <!-- Locked hat: same cream western hat language; keep this constant. -->
  <g transform="translate(71 80) rotate(-5) scale(.40)" filter="url(#lift)">
    <path d="M30 260 C143 306 307 329 498 317 C682 306 848 273 997 219 C1062 196 1121 207 1142 244 C1164 284 1103 325 1000 346 C747 396 516 416 314 394 C164 378 44 344 -48 286 C-95 256 -29 236 30 260Z" fill="url(#brim)" stroke="#211506" stroke-width="16" stroke-linejoin="round"/>
    <path d="M98 269 C229 298 392 306 564 294 C731 282 878 257 1010 220" fill="none" stroke="#fff8df" stroke-width="13" stroke-linecap="round" opacity="0.78"/>
    <path d="M310 291 C295 201 301 120 324 49 C343 -9 389 -43 458 -50 C562 -62 653 -41 705 2 C744 35 759 78 752 136 C744 203 751 254 770 289 C649 326 428 326 310 291Z" fill="url(#felt)" stroke="#211506" stroke-width="16" stroke-linejoin="round"/>
    <path d="M408 54 C493 86 600 92 715 61" fill="none" stroke="#fffdf0" stroke-width="18" stroke-linecap="round" opacity="0.84"/>
    <path d="M468 -36 C423 22 405 88 411 160" fill="none" stroke="#b09866" stroke-width="13" stroke-linecap="round" opacity="0.54"/>
    <path d="M625 -28 C665 28 678 91 665 161" fill="none" stroke="#b09866" stroke-width="13" stroke-linecap="round" opacity="0.5"/>
    <path d="M323 269 C433 304 650 306 759 272" fill="none" stroke="#18130e" stroke-width="41" stroke-linecap="round"/>
    <path d="M342 264 C456 288 635 289 743 266" fill="none" stroke="#4c3728" stroke-width="11" stroke-linecap="round" opacity="0.9"/>
    <circle cx="377" cy="268" r="21" fill="url(#silver)" stroke="#211506" stroke-width="4"/>
    <circle cx="445" cy="280" r="11" fill="url(#turquoise)" stroke="#211506" stroke-width="4"/>
    <circle cx="515" cy="283" r="11" fill="url(#silver)" stroke="#211506" stroke-width="4"/>
    <circle cx="585" cy="281" r="11" fill="url(#turquoise)" stroke="#211506" stroke-width="4"/>
    <circle cx="662" cy="273" r="11" fill="url(#silver)" stroke="#211506" stroke-width="4"/>
    <circle cx="733" cy="259" r="21" fill="url(#silver)" stroke="#211506" stroke-width="4"/>
  </g>
</svg>
