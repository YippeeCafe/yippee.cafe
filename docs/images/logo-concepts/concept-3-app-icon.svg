<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Yippee Cafe logo concept 3 - app icon</title>
  <desc id="desc">A compact app-icon logo with YC letters, a cowboy hat, lasso loop, and warm cafe colors.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffcf33"/>
      <stop offset="0.55" stop-color="#fb8500"/>
      <stop offset="1" stop-color="#ff6f91"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#251605" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <circle cx="208" cy="194" r="114" fill="#fff7e8" opacity="0.22"/>
  <circle cx="835" cy="836" r="150" fill="#219ebc" opacity="0.24"/>
  <g filter="url(#shadow)">
    <ellipse cx="512" cy="556" rx="292" ry="184" fill="none" stroke="#fff7e8" stroke-width="34" transform="rotate(-16 512 556)"/>
    <path d="M323 693c-58 56-104 112-139 168" fill="none" stroke="#fff7e8" stroke-width="30" stroke-linecap="round"/>
    <text x="512" y="666" text-anchor="middle" fill="#251605" stroke="#fff7e8" stroke-width="18" paint-order="stroke fill" font-family="Cooper Black, Baloo 2, Arial Rounded MT Bold, system-ui, sans-serif" font-size="342" font-weight="900" letter-spacing="-34">YC</text>
    <g transform="translate(230 178) rotate(-8)">
      <path d="M76 140c46-79 114-117 201-117 52 0 83 30 110 30 26 0 59-21 95-5 47 20 72 68 82 130-121 24-248 22-488-38z" fill="#8b4a17" stroke="#251605" stroke-width="18" stroke-linejoin="round"/>
      <path d="M112 140c87 36 229 55 413 27" fill="none" stroke="#ffcf33" stroke-width="28" stroke-linecap="round"/>
      <path d="M-4 156c147 62 360 78 656 20 36-7 64 28 42 58-40 54-138 86-293 95-181 11-325-17-428-86-32-21-17-101 23-87z" fill="#a85f21" stroke="#251605" stroke-width="18" stroke-linejoin="round"/>
    </g>
  </g>
  <text x="512" y="902" text-anchor="middle" fill="#251605" font-family="Inter, Avenir Next, system-ui, sans-serif" font-size="48" font-weight="1000" letter-spacing="6">YIPPEE CAFE</text>
</svg>
