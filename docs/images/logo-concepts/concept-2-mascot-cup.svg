<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Yippee Cafe logo concept 2 - mascot cup</title>
  <desc id="desc">A cheerful coffee cup mascot wearing a cowboy hat and swinging a lasso beside the Yippee Cafe wordmark.</desc>
  <defs>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffcf33"/>
      <stop offset="0.55" stop-color="#fb8500"/>
      <stop offset="1" stop-color="#ff6f91"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="15" flood-color="#251605" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="1400" height="900" rx="72" fill="#fff7e8"/>
  <circle cx="230" cy="165" r="120" fill="#ff6f91" opacity="0.18"/>
  <circle cx="1240" cy="178" r="170" fill="#219ebc" opacity="0.15"/>

  <!-- Mascot + lasso -->
  <g transform="translate(130 150)" filter="url(#shadow)">
    <ellipse cx="282" cy="256" rx="150" ry="92" fill="none" stroke="#c67a16" stroke-width="20" transform="rotate(-21 282 256)"/>
    <path d="M385 318c76 36 143 91 199 169" fill="none" stroke="#c67a16" stroke-width="17" stroke-linecap="round"/>
    <path d="M208 374h278l-35 240c-10 68-68 118-138 118h-24c-70 0-128-50-138-118l-35-240h92z" fill="#fff" stroke="#251605" stroke-width="18" stroke-linejoin="round"/>
    <path d="M486 436h56c58 0 103 47 96 103-7 53-52 93-106 93h-72" fill="none" stroke="#251605" stroke-width="18" stroke-linecap="round"/>
    <path d="M208 448h278" stroke="url(#warm)" stroke-width="40" stroke-linecap="round"/>
    <circle cx="258" cy="532" r="14" fill="#251605"/>
    <circle cx="365" cy="532" r="14" fill="#251605"/>
    <path d="M278 590c31 29 71 29 104 0" fill="none" stroke="#251605" stroke-width="13" stroke-linecap="round"/>
    <path d="M191 318c45-77 111-115 198-115 51 0 82 30 109 30 26 0 58-21 93-5 47 20 72 67 81 128-120 24-246 22-481-38z" fill="#8b4a17" stroke="#251605" stroke-width="17" stroke-linejoin="round"/>
    <path d="M227 319c85 35 226 53 407 26" fill="none" stroke="#ffcf33" stroke-width="26" stroke-linecap="round"/>
    <path d="M112 333c144 61 354 77 645 20 36-7 63 27 41 57-39 53-136 84-288 94-178 11-319-17-420-84-32-21-17-100 22-87z" fill="#a85f21" stroke="#251605" stroke-width="17" stroke-linejoin="round"/>
  </g>

  <g transform="translate(680 250)">
    <text x="0" y="190" fill="#251605" font-family="Cooper Black, Baloo 2, Arial Rounded MT Bold, system-ui, sans-serif" font-size="170" font-weight="900" letter-spacing="-10">Yippee</text>
    <text x="7" y="340" fill="url(#warm)" stroke="#251605" stroke-width="6" paint-order="stroke fill" font-family="Cooper Black, Baloo 2, Arial Rounded MT Bold, system-ui, sans-serif" font-size="140" font-weight="900" letter-spacing="-6">Cafe</text>
    <path d="M20 392c146 44 354 48 610 9" fill="none" stroke="#219ebc" stroke-width="15" stroke-linecap="round"/>
    <text x="310" y="464" text-anchor="middle" fill="#6c4a1f" font-family="Inter, Avenir Next, system-ui, sans-serif" font-size="31" font-weight="900" letter-spacing="4">APPS • GAMES • TINY DELIGHTS</text>
  </g>
