<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-labelledby="title desc">
  <title id="title">Yippee Cafe icon-only logo concept with cafe accent</title>
  <desc id="desc">An icon-only Yippee Cafe mark testing a subtle cafe cue: cream cowboy hat, lasso frame, and a simple coffee cup without a face.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffaf0"/>
      <stop offset="0.55" stop-color="#fff0cb"/>
      <stop offset="1" stop-color="#ffd578"/>
    </linearGradient>
    <linearGradient id="felt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdf3"/>
      <stop offset="0.56" stop-color="#eee1c4"/>
      <stop offset="1" stop-color="#c3a36d"/>
    </linearGradient>
    <linearGradient id="brim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff9e8"/>
      <stop offset="0.52" stop-color="#e5cf9e"/>
      <stop offset="1" stop-color="#9b6b2d"/>
    </linearGradient>
    <linearGradient id="rope" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe08a"/>
      <stop offset="0.5" stop-color="#d98b20"/>
      <stop offset="1" stop-color="#7a3b0d"/>
    </linearGradient>
    <radialGradient id="silver" cx="35%" cy="28%" r="75%">
      <stop offset="0" stop-color="#fffef7"/>
      <stop offset="0.45" stop-color="#d4d1c6"/>
      <stop offset="1" stop-color="#4a4841"/>
    </radialGradient>
    <radialGradient id="turquoise" cx="35%" cy="28%" r="75%">
      <stop offset="0" stop-color="#d7fff8"/>
      <stop offset="0.5" stop-color="#3ec2bc"/>
      <stop offset="1" stop-color="#095a56"/>
    </radialGradient>
    <filter id="lift" x="-14%" y="-14%" width="128%" height="128%">
      <feDropShadow dx="0" dy="10" stdDeviation="6" flood-color="#2b1805" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="600" height="600" rx="112" fill="url(#bg)"/>

  <!-- Lasso remains the secondary shape; it frames without becoming spaghetti. -->
  <g filter="url(#lift)" opacity="0.96">
    <path d="M84 397 C169 463 352 470 471 397 C546 351 553 259 496 206 C430 146 307 156 246 232 C195 296 223 384 300 399 C374 414 441 374 452 312 C462 256 421 221 365 224" fill="none" stroke="#6f360d" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M84 397 C169 463 352 470 471 397 C546 351 553 259 496 206 C430 146 307 156 246 232 C195 296 223 384 300 399 C374 414 441 374 452 312 C462 256 421 221 365 224" fill="none" stroke="url(#rope)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(365 224) rotate(7)">
      <ellipse cx="0" cy="0" rx="22" ry="16" fill="#bf6817" stroke="#6f360d" stroke-width="7"/>
      <ellipse cx="-4" cy="-3" rx="7" ry="4" fill="#fff0ad" opacity="0.48"/>
    </g>
  </g>

  <!-- Hat is still primary. -->
  <g transform="translate(55 92) rotate(-5) scale(.44)" filter="url(#lift)">
    <path d="M30 260 C143 306 307 329 498 317 C682 306 848 273 997 219 C1062 196 1121 207 1142 244 C1164 284 1103 325 1000 346 C747 396 516 416 314 394 C164 378 44 344 -48 286 C-95 256 -29 236 30 260Z" fill="url(#brim)" stroke="#211506" stroke-width="16" stroke-linejoin="round"/>
    <path d="M98 269 C229 298 392 306 564 294 C731 282 878 257 1010 220" fill="none" stroke="#fff8df" stroke-width="13" stroke-linecap="round" opacity="0.78"/>
    <path d="M310 291 C295 201 301 120 324 49 C343 -9 389 -43 458 -50 C562 -62 653 -41 705 2 C744 35 759 78 752 136 C744 203 751 254 770 289 C649 326 428 326 310 291Z" fill="url(#felt)" stroke="#211506" stroke-width="16" stroke-linejoin="round"/>
    <path d="M408 54 C493 86 600 92 715 61" fill="none" stroke="#fffdf0" stroke-width="18" stroke-linecap="round" opacity="0.84"/>
    <path d="M468 -36 C423 22 405 88 411 160" fill="none" stroke="#b09866" stroke-width="13" stroke-linecap="round" opacity="0.54"/>
    <path d="M625 -28 C665 28 678 91 665 161" fill="none" stroke="#b09866" stroke-width="13" stroke-linecap="round" opacity="0.5"/>
    <path d="M323 269 C433 304 650 306 759 272" fill="none" stroke="#18130e" stroke-width="41" stroke-linecap="round"/>
    <path d="M342 264 C456 288 635 289 743 266" fill="none" stroke="#4c3728" stroke-width="11" stroke-linecap="round" opacity="0.9"/>
    <circle cx="377" cy="268" r="21" fill="url(#silver)" stroke="#211506" stroke-width="4"/>
    <circle cx="445" cy="280" r="11" fill="url(#turquoise)" stroke="#211506" stroke-width="4"/>
    <circle cx="515" cy="283" r="11" fill="url(#silver)" stroke="#211506" stroke-width="4"/>
    <circle cx="585" cy="281" r="11" fill="url(#turquoise)" stroke="#211506" stroke-width="4"/>
    <circle cx="662" cy="273" r="11" fill="url(#silver)" stroke="#211506" stroke-width="4"/>
    <circle cx="733" cy="259" r="21" fill="url(#silver)" stroke="#211506" stroke-width="4"/>
  </g>

  <!-- Cafe cue: no smiley face. Simple mug + steam, small enough not to turn the brand into a generic coffee mascot. -->
  <g transform="translate(197 363)" filter="url(#lift)">
    <path d="M25 48 C25 33 37 24 57 24 H165 C185 24 197 33 197 48 V83 C197 123 165 148 111 148 C57 148 25 123 25 83Z" fill="#fff8e9" stroke="#241507" stroke-width="11" stroke-linejoin="round"/>
    <path d="M198 55 H216 C244 55 253 91 231 108 C220 117 207 116 197 112" fill="none" stroke="#241507" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M54 51 C82 63 141 64 168 51" fill="none" stroke="#6f3d16" stroke-width="9" stroke-linecap="round"/>
    <path d="M73 9 C53 -14 82 -30 67 -55" fill="none" stroke="#6f3d16" stroke-width="10" stroke-linecap="round" opacity="0.82"/>
    <path d="M114 6 C93 -17 125 -31 110 -59" fill="none" stroke="#6f3d16" stroke-width="10" stroke-linecap="round" opacity="0.82"/>
    <path d="M154 9 C134 -14 164 -28 150 -53" fill="none" stroke="#6f3d16" stroke-width="10" stroke-linecap="round" opacity="0.82"/>
    <circle cx="111" cy="86" r="12" fill="url(#turquoise)" stroke="#241507" stroke-width="5"/>
  </g>
</svg>
